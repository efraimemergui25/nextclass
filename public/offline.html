<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

  <title>NextClass — אין חיבור לאינטרנט</title>
  <style>

      margin: 0 auto 24px;

      align-items: center;
      justify-content: center;
    }

    p { font-size: 15px; color: #6E6E73; line-height: 1.5; max-width: 280px; margin: 0 auto 32px; }
    button {
      background: #007AFF;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
